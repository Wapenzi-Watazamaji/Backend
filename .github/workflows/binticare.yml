name: BintiCare CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Runs on every PR into main (from lewi, ephy, or any other branch) AND on every
  # push to main. On PRs it only builds — to catch broken Dockerfiles/deps before
  # merge — it never pushes an image or touches the droplet.
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name/tag
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image=${{ env.REGISTRY }}/${REPO_LOWER}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${{ env.REGISTRY }}/${REPO_LOWER}:latest" >> "$GITHUB_OUTPUT"

      - name: Build (and push only on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.image_latest }}

  # Only fires after a real push to main — i.e. once the PR is merged. Never runs
  # for PRs from lewi or ephy directly, so nothing touches the droplet pre-merge.
  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/deployer/binticare"
          strip_components: 0

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd /home/deployer/binticare

            cat > .env << 'ENVEOF'
            PROJECT_NAME=binticare
            SECRET_KEY=${{ secrets.APP_SECRET_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379/0
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            ENVEOF
            chmod 600 .env

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export IMAGE=${{ needs.build-and-push.outputs.image }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -af --filter "until=72h"
            docker logout ghcr.io
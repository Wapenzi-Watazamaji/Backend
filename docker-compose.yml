services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: binticare_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8085:8085"
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - binticare_net
    volumes:
      - ./app:/app/app

  redis:
    image: redis:7.2-alpine
    container_name: binticare_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - binticare_net

volumes:
  redis_data:
    driver: local

networks:
  binticare_net:
    driver: bridge
